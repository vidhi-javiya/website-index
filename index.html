<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Website Dashboard</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: Arial, sans-serif;
}

body{
    background:#f4f4f4;
}

.header{
    background:#2c3e50;
    color:white;
    padding:20px;
    text-align:center;
}

.container{
    display:flex;
}

.sidebar{
    width:250px;
    height:100vh;
    background:#34495e;
    color:white;
    padding-top:20px;
}

.sidebar ul{
    list-style:none;
}

.sidebar ul li{
    padding:15px 20px;
    cursor:pointer;
}

.sidebar ul li:hover{
    background:#2c3e50;
}

.main-content{
    flex:1;
    padding:20px;
}

.cards{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:20px;
}

.card{
    background:white;
    padding:20px;
    border-radius:10px;
    box-shadow:0 2px 5px rgba(0,0,0,0.2);
    text-align:center;
}

.card h2{
    color:#3498db;
    margin-bottom:10px;
}
</style>
</head>

<body>

<div class="header">
    <h1>My Website Dashboard</h1>
</div>

<div class="container">

    <div class="sidebar">
        <ul>
            <li>🏠 Dashboard</li>
            <li>👤 Users</li>
            <li>📦 Products</li>
            <li>📊 Reports</li>
            <li>⚙ Settings</li>
            <li>🚪 Logout</li>
        </ul>
    </div>

    <div class="main-content">

        <div class="cards">

            <div class="card">
                <h2>150</h2>
                <p>Total Users</p>
            </div>

            <div class="card">
                <h2>85</h2>
                <p>Orders</p>
            </div>

            <div class="card">
                <h2>45</h2>
                <p>Products</p>
            </div>

            <div class="card">
                <h2>₹25,000</h2>
                <p>Revenue</p>
            </div>

        </div>

        <br><br>

        <div class="card">
            <h2>Welcome</h2>
            <p>Welcome to My Website Dashboard Page.</p>
        </div>

    </div>

</div>

</body>
</html>
